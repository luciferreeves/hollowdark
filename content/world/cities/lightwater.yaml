character: |
  A smaller inland city built around the university, which employs more than a sixth of the working population directly and another sixth indirectly. Stone quadrangles, a cathedral the Quiet Path shares with the Covenant on alternating afternoons, student housing in old stone buildings with inner courtyards, and a ring of newer research buildings on the southern edge. A town that empties for six weeks every summer and fills again in the autumn rain. Two decent bookshops, three good ones, and a river that runs the length of the old quarter.
