id: mirror_coast
display_name: Mirror Coast
population_weight: 0.12

climate:
  summary: Wet autumns, mild winters, cool summers. Fog off the water for most of the year, and a rainy season that runs long.
  temperature_range_c: [-2, 24]
  annual_rainfall_mm: 1180

economy:
  summary: Publishing, universities, design studios, the old shipping trade, and a finance industry that quietly funds most of it.
  dominant_sectors:
    - publishing
    - education
    - design
    - shipping
    - finance
  inequality: high

culture:
  summary: Cosmopolitan, literate, liberal-leaning, secularised.
  texture: |
    People here read. They argue in cafés about things no one else cares about, know which essay ran in which magazine last month, carry second pairs of shoes to work in the rainy season. Rents go up every quarter. The working class is getting priced out of the old port wards. New money buys the corner buildings and paints them.

class_texture: |
  The professional class is comfortable and tired. The working class is hanging on in the old port wards and the inland mill towns. Real poverty sits in single rooms above the shops, in long-stay rentals down by the docks, visible mostly to those who live there.

religion:
  covenant: 0.25
  old_faith: 0.05
  quiet_path: 0.25
  secular: 0.45

