stereotypes:
  held_by_others: Snobs. Pricing everyone out of housing. Rude in restaurants. Read too many books. Pretty nice if you get to know them.
  self_image: Sophisticated. Literate. Put upon by everyone else's resentment. Built the publishing houses, the universities, the shipping trade. The fog is ours.
